name: Update Grand Slam data

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min (UTC); cheap no-op between Slams
  workflow_dispatch:           # run on demand from the Actions tab

permissions:
  contents: write              # needed to commit data.json

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6 (SHA-pinned)

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6 (SHA-pinned)
        with:
          python-version: "3.12"

      - name: Fetch data from the ESPN public feed
        run: python fetch_data.py

      - name: Fill official highlights (fail-safe — merge-only, ok if YouTube blocks CI)
        run: python build_highlights.py || true

      - name: Commit if changed
        run: |
          git config user.name  "slam-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json champions.json highlights.json
          git diff --staged --quiet || git commit -m "Update data $(date -u +%FT%TZ)"
          git pull --rebase origin main
          git push
